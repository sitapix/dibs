name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race ./... -short -count=1

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -trimpath -o dibs-${{ matrix.goos }}-${{ matrix.goarch }} .

      - uses: actions/upload-artifact@v4
        with:
          name: dibs-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dibs-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum dibs-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/dibs-*
            artifacts/checksums.txt

  update-formula:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute source tarball SHA256
        id: sha
        run: |
          curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz" -o source.tar.gz
          SHA=$(sha256sum source.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update tap repository
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          VERSION="${TAG#v}"

          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/sitapix/homebrew-dibs.git" homebrew-tap
          mkdir -p homebrew-tap/Formula
          cp Formula/dibs.rb homebrew-tap/Formula/dibs.rb
          cd homebrew-tap

          sed -i "s|url \".*\"|url \"https://github.com/sitapix/dibs/archive/refs/tags/${TAG}.tar.gz\"|" Formula/dibs.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/dibs.rb

          ruby -c Formula/dibs.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dibs.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "dibs ${VERSION}"
          git push origin main
